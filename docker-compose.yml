services:
  db:
    image: mysql:8.0
    container_name: his_bodega_db
    restart: always
    environment:
      TZ: America/Guatemala
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - his-net
    healthcheck:
      test: "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "3307:3306"  

  backend:
    build:
      context: ./his-bodega-backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      TZ: America/Guatemala
      MYSQL_HOST: db
      MYSQL_PORT: 3306
    networks:
      - his-net
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - backend
    networks:
      - his-net
    ports:
      - "8080:80"

networks:
  his-net:
    driver: bridge

volumes:
  mariadb_data:
